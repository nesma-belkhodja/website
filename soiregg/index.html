<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOIRAVE - May 16</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <main class="flier-container">
        <!-- Logo Section -->
        <div class="logo-section">
            <img src="images/Logos/SOIREGG IV.jpg" alt="Soiregg Soirave" class="main-logo">
        </div>

        <!-- Event Details -->
        <div class="event-info">
            <div class="boxed-text">
                <span>S</span><span>A</span><span>T</span><span>U</span><span>R</span><span>D</span><span>A</span><span>Y</span>
                <span class="space"></span>
                <span>M</span><span>A</span><span>Y</span>
                <span class="space"></span>
                <span>1</span><span>6</span>
            </div>
            <div class="boxed-text">
                <span>1</span><span>1</span><span>P</span><span>M</span>
                <span class="space"></span>
                <span>T</span><span>O</span>
                <span class="space"></span>
                <span>6</span><span>A</span><span>M</span>
            </div>
            <div class="boxed-text">
                <span>L</span><span>O</span><span>C</span><span>A</span><span>T</span><span>I</span><span>O</span><span>N</span>
                <span class="space"></span>
                <span>T</span><span>B</span><span>D</span>
            </div>
        </div>

        <!-- Flier Placeholder -->
        <div class="flier-box">
            <div class="flier-placeholder-text">Flier<br>placeholder</div>
        </div>

        <!-- Buttons -->
        <div class="button-group">
            <a href="rsvp.html" class="rsvp-button">
                <div class="boxed-text">
                    <span>R</span><span>S</span><span>V</span><span>P</span>
                </div>
            </a>

            <a href="photos.html" class="photos-button">
                <div class="boxed-text">
                    <span>P</span><span>H</span><span>O</span><span>T</span><span>O</span><span>S</span>
                </div>
            </a>
        </div>
    </main>

    <!-- Lightbox Modal -->
    <div id="lightbox" class="lightbox">
        <span class="close">&times;</span>
        <img class="lightbox-content" id="lightbox-img">
        <div class="lightbox-nav">
            <button class="prev">&#10094;</button>
            <button class="next">&#10095;</button>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
