<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADMIN - SOIRAVE</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="admin-container">
        <!-- Login Form (hidden - no password required) -->
        <section id="login-section" class="admin-login" style="display: none;">
            <h2>ADMIN LOGIN</h2>
            <form id="login-form">
                <div class="form-group">
                    <label for="password">PASSWORD</label>
                    <input type="password" id="password">
                </div>
                <button type="submit" class="submit-btn">LOGIN</button>
                <p id="login-error" class="error-message"></p>
            </form>
        </section>

        <!-- Admin Dashboard -->
        <section id="dashboard-section" class="admin-dashboard" style="display: none;">
            <div class="dashboard-header">
                <h2>RSVP SUBMISSIONS</h2>
                <div class="dashboard-actions">
                    <button id="export-btn" class="export-btn">EXPORT CSV</button>
                    <a href="index.html" class="admin-back-btn">BACK TO HOME</a>
                </div>
            </div>

            <div class="stats">
                <div class="stat-card">
                    <h3 id="total-rsvps">0</h3>
                    <p>TOTAL RSVPS</p>
                </div>
                <div class="stat-card">
                    <h3 id="total-guests">0</h3>
                    <p>TOTAL GUESTS</p>
                </div>
            </div>

            <div class="search-bar">
                <input type="text" id="search-input" placeholder="SEARCH BY NAME OR PHONE...">
            </div>

            <div class="rsvp-table-container">
                <table class="rsvp-table">
                    <thead>
                        <tr>
                            <th>DATE</th>
                            <th>NAME</th>
                            <th>PHONE</th>
                            <th>NOTE</th>
                            <th>ACTIONS</th>
                        </tr>
                    </thead>
                    <tbody id="rsvp-table-body">
                        <tr>
                            <td colspan="5" class="no-data">LOADING RSVPS...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </div>

    <script type="module" src="js/admin.js"></script>
</body>
</html>
